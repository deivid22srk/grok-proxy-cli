name: CLI Build

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build CLI (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: amd64
          - runner: macos-14
            os: darwin
            arch: arm64
          - runner: windows-latest
            os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o grok-proxy-cli ./cmd/grok-proxy-cli

      - name: Smoke test (unix)
        if: matrix.os != 'windows'
        run: ./grok-proxy-cli --help

      - name: Rename for Windows
        if: matrix.os == 'windows'
        run: mv grok-proxy-cli grok-proxy-cli.exe

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          mv "grok-proxy-cli${ext}" "dist/grok-proxy-cli-${{ matrix.os }}-${{ matrix.arch }}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-proxy-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: grok-proxy-cli ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
